name: Refresh journey map

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Fetch recent eBay orders into private workspace
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          EBAY_REFRESH_TOKEN: ${{ secrets.EBAY_REFRESH_TOKEN }}
        run: python scripts/sync_ebay.py
      - name: Build generalized public dataset
        env:
          GEOCODER_EMAIL: ${{ secrets.GEOCODER_EMAIL }}
        run: >-
          python scripts/build_map_data.py
          --input private/ebay_api_orders.json
          --existing public/data/shipments.json
      - name: Verify privacy boundary and pipeline
        run: pytest -q
      - name: Commit safe outputs when changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/shipments.json data/city-cache.json
          git diff --cached --quiet || git commit -m "data: refresh generalized shipment map"
          git push
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload refreshed site
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: refresh
    steps:
      - name: Deploy refreshed site
        id: deployment
        uses: actions/deploy-pages@v4
